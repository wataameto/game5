<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>game5 - New Project</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Zen+Maru+Gothic:wght@500;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="welcome-container">
    <div class="welcome-card">
      <div class="glow-effect"></div>
      <div class="project-badge">PROJECT v5.0</div>
      <h1>game5</h1>
      <p class="subtitle">Next Creative Generation</p>
      
      <div class="status-box">
        <span class="pulse-indicator"></span>
        <span class="status-text">企画フェーズ: 開発準備完了</span>
      </div>

      <p class="description">
        game5 の初期セットアップに成功しました！<br>
        この画面が表示されていれば、3D描画、物理演算、音声・グラフィックギミックなど、あらゆる最新Web技術を組み込む準備ができています。
      </p>

      <div class="prompt-box">
        <div class="prompt-title">👇 次にすること</div>
        <p>「どんなゲームを作りたいか」をAntigravityに伝えてください！</p>
        <div class="idea-tags">
          <span class="tag">#3Dアクション</span>
          <span class="tag">#シミュレーション</span>
          <span class="tag">#リズムゲーム</span>
          <span class="tag">#ボードゲーム</span>
        </div>
      </div>

      <footer class="footer">
        Repository: <a href="https://github.com/wataameto/game5" target="_blank">wataameto/game5</a>
      </footer>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
